<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0a0a0f; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 3px; }
  button, [role="button"] { transition: all 0.15s ease; }
  .flow-tip { position: relative; display: inline-flex; cursor: help; }
  .flow-tip .flow-tip-text { visibility: hidden; opacity: 0; position: absolute; top: calc(100% + 10px); left: 50%; transform: translateX(-50%);
    width: 300px; padding: 14px 16px; border-radius: 12px; font-size: 13px; line-height: 1.65; font-family: 'DM Sans', sans-serif;
    font-style: normal; font-weight: 400; text-align: left; pointer-events: none; transition: opacity 0.25s ease; z-index: 100; letter-spacing: 0.01em; }
  .flow-tip:hover .flow-tip-text { visibility: visible; opacity: 1; }
  @keyframes nowBreathe { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes nowAurora { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  @keyframes checkPop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }


  @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }
  .flow-scroll { scrollbar-gutter: stable; }
  .rte-editor:empty:before { content: attr(data-placeholder); color: var(--rte-ph-color, #888); pointer-events: none; }
  .flow-hide-scroll::-webkit-scrollbar { display: none; }
  .flow-hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .flow-grain { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; opacity: 0.03; }
  .flow-grain svg { width: 100%; height: 100%; }
  /* Splash screen */
  #splash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0f; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh; transition: opacity 0.4s ease; }
  #splash.fade { opacity: 0; pointer-events: none; }
  #splash .title { font-family: 'DM Sans', Arial, sans-serif; font-size: 22px; font-weight: 300; letter-spacing: 0.25em;
    color: rgba(132,155,232,0.9); opacity: 0;
    animation: splashIn 0.6s ease-out 0.1s forwards, splashOut 0.8s ease-in 1.8s forwards; cursor: pointer; }
  @keyframes splashIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes splashOut { 0% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes breatheSlow { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.5); opacity: 1; } }
  /* Mobile responsive */
  @media (max-width: 600px) {
    ::-webkit-scrollbar { width: 3px; }
    .flow-grain { display: none; }
    input, textarea, select { font-size: 16px !important; }
    button { min-height: 36px; }
  }
