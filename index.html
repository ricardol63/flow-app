  .flow-hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .flow-grain { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; opacity: 0.03; }

/* ═══ FOCUS PANEL ═══ */
function FocusPanel({centerDate,tasks,goals,focus,P}){
  var [hoverGoal,setHoverGoal]=useState(null);
  var todayKey=dkey(centerDate||new Date());
  var dayTasks=(tasks[todayKey]||[]).filter(function(t){return t.time&&t.goalId;});
  var totalPlanned=0;var totalFocused=0;var byGoal={};
  dayTasks.forEach(function(t){
    var planned=t.time&&t.timeEnd?t2m(t.timeEnd)-t2m(t.time):0;
    var actual=(t.focusMinutes||0)+(t.loggedMinutes||0);
    if(focus&&focus.taskId===t.id&&focus.dayKey===todayKey)actual+=Math.floor(focus.elapsed/60);
    totalPlanned+=planned;totalFocused+=actual;
    var gId=t.goalId;if(!byGoal[gId])byGoal[gId]={planned:0,actual:0,color:t.goalColor||P.ac,name:"",tasks:[]};
    byGoal[gId].planned+=planned;byGoal[gId].actual+=actual;
    byGoal[gId].tasks.push({text:t.text,planned:planned,actual:actual,id:t.id,
      isFocused:focus&&focus.taskId===t.id&&focus.dayKey===todayKey});});
  goals.forEach(function(g){if(byGoal[g.id])byGoal[g.id].name=g.name;});
  var goalEntries=Object.keys(byGoal).map(function(k){return byGoal[k];}).sort(function(a,b){return b.actual-a.actual;});
  var hasLoggedTime=totalFocused>0;
  if(!focus&&!hasLoggedTime)return null;
  var fmtM=function(m){return m>=60?Math.floor(m/60)+"h"+(m%60>0?" "+(m%60)+"m":""):m+"m";};
  /* Ring math */
  var ringR=30;var ringStroke=3;var ringC=2*Math.PI*ringR;
  var ringPct=totalPlanned>0?Math.min(1,totalFocused/totalPlanned):0;
  var ringOffset=ringC*(1-ringPct);
  var ringSize=(ringR+ringStroke)*2+4;
  /* Active goal highlight */
  var activeGoalIdx=focus?goalEntries.findIndex(function(g){return g.tasks.some(function(t){return t.isFocused;})}):null;
  return(
    <div style={{position:"fixed",top:80,right:"max(12px, calc(50% - 580px))",width:160,
      fontFamily:"'DM Sans',sans-serif",zIndex:30,maxHeight:"calc(100vh - 100px)",overflowY:"auto",
      background:P.panel+"e6",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
      borderRadius:16,border:"1px solid "+P.bd+"44",
      boxShadow:"0 8px 32px "+P.shadow+", inset 0 1px 0 rgba(255,255,255,0.03)",
      padding:"20px 16px 16px"}}
      className="flow-hide-scroll">
      {/* Ring + total */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:16}}>
        <div style={{position:"relative",width:ringSize,height:ringSize}}>
          <svg width={ringSize} height={ringSize} style={{transform:"rotate(-90deg)"}}>
            <circle cx={ringSize/2} cy={ringSize/2} r={ringR} fill="none"
              stroke={P.bd+"33"} strokeWidth={ringStroke}/>
            <circle cx={ringSize/2} cy={ringSize/2} r={ringR} fill="none"
              stroke={ringPct>=1?P.gn:P.ac} strokeWidth={ringStroke}
              strokeDasharray={ringC} strokeDashoffset={ringOffset}
              strokeLinecap="round"
              style={{transition:"stroke-dashoffset 1s linear, stroke 0.3s"}}/>
          </svg>
          {/* Center text */}
          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:14,fontWeight:700,color:P.tx,fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>
              {fmtM(totalFocused)}</span>
          </div>
        </div>
        <div style={{fontSize:10,color:P.td,fontFamily:"'DM Sans',sans-serif",marginTop:6}}>
          of {fmtM(totalPlanned)}</div>
      </div>
      {/* Goal bands */}
      {goalEntries.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {goalEntries.map(function(g,gi){
          var pct=g.planned>0?Math.min(100,Math.round(g.actual/g.planned*100)):0;
          var isActive=activeGoalIdx===gi;
          var isHovered=hoverGoal===gi;
          return(
            <div key={gi}
              onMouseEnter={function(){setHoverGoal(gi);}}
              onMouseLeave={function(){setHoverGoal(null);}}
              style={{cursor:"default",transition:"all 0.2s"}}>
              {/* Goal name + time */}
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                <span style={{fontSize:10,color:isActive?g.color:P.tm,fontWeight:500,
                  fontFamily:"'DM Sans',sans-serif",flex:1,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name||"Goal"}</span>
                <span style={{fontSize:9,color:isActive?g.color:P.td,fontFamily:"'DM Sans',sans-serif",
                  fontWeight:isActive?600:400,flexShrink:0}}>{fmtM(g.actual)}</span>
              </div>
              {/* Band */}
              <div style={{height:4,borderRadius:2,background:P.bd+"22",overflow:"hidden",position:"relative"}}>
                <div style={{height:"100%",borderRadius:2,
                  background:isActive?"linear-gradient(90deg, "+g.color+", "+g.color+"cc)":g.color,
                  width:pct+"%",transition:"width 1s linear",
                  boxShadow:isActive?"0 0 8px "+g.color+"44":"none"}}/></div>
              {/* Hover detail — per-task breakdown */}
              {isHovered&&g.tasks.length>0&&<div style={{marginTop:6,paddingLeft:2}}>
                {g.tasks.map(function(t){
                  var tPct=t.planned>0?Math.min(100,Math.round(t.actual/t.planned*100)):0;
                  return(
                    <div key={t.id} style={{marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                        {t.isFocused&&<div style={{width:3,height:3,borderRadius:"50%",background:g.color,flexShrink:0,
                          animation:"nowPulse 2s ease-in-out infinite"}}/>}
                        <span style={{fontSize:9,color:t.isFocused?P.tx:P.td,flex:1,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                          fontFamily:"'DM Sans',sans-serif",fontWeight:t.isFocused?500:400}}>{t.text}</span>
                        <span style={{fontSize:8,color:P.td,fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>
                          {t.actual>0?fmtM(t.actual):""}</span>
                      </div>
                      <div style={{height:2,borderRadius:1,background:P.bd+"18"}}>
                        <div style={{height:2,borderRadius:1,background:g.color+"66",
                          width:tPct+"%",transition:"width 0.5s"}}/></div>
                    </div>);})}</div>}
            </div>);})}
      </div>}
      {/* Separator */}
      {goalEntries.length>0&&focus&&<div style={{height:1,background:P.bd+"22",margin:"12px 0"}}/>}
      {/* Active task — alive at the bottom */}
      {focus&&<div style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:focus.color,flexShrink:0,
          boxShadow:"0 0 8px "+focus.color+"55",
          animation:focus.paused?"none":"nowPulse 2s ease-in-out infinite"}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:focus.color,fontFamily:"'DM Sans',sans-serif",fontWeight:600,
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{focus.taskName}</div>
          <div style={{fontSize:13,color:P.tx,fontFamily:"'DM Sans',sans-serif",fontWeight:700,lineHeight:1}}>
            {fmtTimer(focus.elapsed)}{focus.paused&&<span style={{fontSize:9,color:P.am,marginLeft:4,fontWeight:500}}>paused</span>}</div>
        </div>
      </div>}
    </div>);}

/* ═══ GOAL TRACKING ═══ */
function GoalTracker({goals,tasks,P}){
  var monday=getMonday(new Date());var weekKeys=[];for(var i=0;i<7;i++)weekKeys.push(dkey(addD(monday,i)));
  var stats=goals.map(function(g){
    var plannedMin=0;g.days.forEach(function(on){if(!on)return;g.timeRanges.forEach(function(tr){
      var s=t2m(tr.start);var e=t2m(tr.end);if(e>s)plannedMin+=(e-s);});});
    var actualMin=0;weekKeys.forEach(function(dk){(tasks[dk]||[]).forEach(function(t){
      if(t.goalId===g.id){actualMin+=(t.focusMinutes||0)+(t.loggedMinutes||0);}});});
    return{goal:g,plannedMin:plannedMin,actualMin:actualMin,pct:plannedMin>0?Math.round((actualMin/plannedMin)*100):0};});
  if(stats.length===0)return(<div style={{padding:20,textAlign:"center",color:P.td,fontSize:14}}>No goals yet.</div>);
  return(<div style={{padding:"16px 0"}}>
    <div style={{fontSize:11,fontWeight:600,color:P.tm,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,padding:"0 24px"}}>This Week's Progress</div>
    <div style={{display:"flex",flexDirection:"column",gap:12,padding:"0 24px"}}>
      {stats.map(function(s){return(
        <div key={s.goal.id} style={{display:"flex",flexDirection:"column",gap:6,padding:"12px 14px",borderRadius:10,background:s.goal.color+"20",border:"1px solid "+s.goal.color+"33"}}>

            <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:s.goal.color}}/>
              <span style={{fontSize:14,fontWeight:600,color:P.tx}}>{s.goal.name}</span></div>
            <span style={{fontSize:20,fontWeight:700,color:s.pct>=100?P.gn:s.pct>=50?s.goal.color:P.am,fontFamily:"'DM Mono',monospace"}}>{s.pct}%</span></div>
          <div style={{height:6,background:P.bd,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(100,s.pct)+"%",background:s.pct>=100?P.gn:s.goal.color,borderRadius:3,transition:"width 0.5s"}}/></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
            <span style={{color:P.tm}}>Actual: <span style={{color:P.tx,fontWeight:600}}>{fmtHrs(s.actualMin)}</span></span>
            <span style={{color:P.tm}}>Planned: <span style={{color:P.tx,fontWeight:600}}>{fmtHrs(s.plannedMin)}</span></span></div></div>);})}</div></div>);}

  var [logMin,setLogMin]=useState("");var [targetMin,setTargetMin]=useState("");
  var [editSubId,setEditSubId]=useState(null);var [editSubText,setEditSubText]=useState("");
  var [showDatePick,setShowDatePick]=useState(false);

  var datePickOpts=useMemo(function(){var opts=[];for(var i=0;i<=30;i++){var dd=addD(new Date(),i);var dk=dkey(dd);
    var lb=i===0?"Today":i===1?"Tomorrow":DA[dd.getDay()]+" "+MOF[dd.getMonth()]+" "+dd.getDate();
    opts.push({dk:dk,lb:lb});}return opts;},[]);
  var subRef=useRef(null);var notesTimer=useRef(null);var whyTimer=useRef(null);
  var [whyText,setWhyText]=useState(task.why||"");
  var parts=dayKey.split("-");var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var dateLabel=DA[d.getDay()]+", "+MOF[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();
  var subs=task.subtasks||[];var doneCount=subs.filter(function(s){return s.done;}).length;
  var hasGoal=!!task.goalId;
  var assignedGoal=hasGoal&&goals?goals.find(function(g){return g.id===task.goalId;}):null;
  // Escape to close, M to quick-move
  useEffect(function(){var h=function(e){if(e.key==="Escape")onClose();
    if(e.key.toLowerCase()==="m"&&e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA"&&!e.target.isContentEditable&&onQuickMove){e.preventDefault();onQuickMove(task,dayKey);}

        return(<div key={task.id} style={{display:"flex",flexDirection:"column",gap:2,opacity:task.done?0.45:1}}>

function SearchPanel({tasks,inbox,goals,goalWorkspaces,gratEntries,logEntries,refocusEntries,milestones,onClose,onNavigate,P}){
  var [query,setQuery]=useState("");var inputRef=useRef(null);
  useEffect(function(){if(inputRef.current)inputRef.current.focus();},[]);
  useEffect(function(){var h=function(e){if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return function(){document.removeEventListener("keydown",h);};},[onClose]);
  var results=useMemo(function(){if(!query.trim()||query.length<2)return[];var q=query.toLowerCase();var r=[];
    try{
    // Calendar tasks
    Object.keys(tasks||{}).forEach(function(dk){(tasks[dk]||[]).forEach(function(t){
      if(!t)return;
      if((t.text||"").toLowerCase().indexOf(q)>=0||(t.notes||"").toLowerCase().indexOf(q)>=0)
        r.push({type:"task",text:t.text||"",sub:dk+(t.notes&&t.notes.toLowerCase().indexOf(q)>=0?" · in notes":""),dk:dk,id:t.id});});});
    // Inbox
    (inbox||[]).forEach(function(item){if(!item)return;
      if((item.text||"").toLowerCase().indexOf(q)>=0||(item.notes||"").toLowerCase().indexOf(q)>=0)
      r.push({type:"inbox",text:item.text||"",sub:"Inbox"+(item.notes&&item.notes.toLowerCase().indexOf(q)>=0?" · in notes":""),id:item.id});});
    // Goal tasks
    (goals||[]).forEach(function(g){if(!g)return;var ws=(goalWorkspaces||{})[g.id];if(!ws)return;
      (ws.tasks||[]).forEach(function(t){if(!t)return;
        if((t.text||"").toLowerCase().indexOf(q)>=0||(t.notes||"").toLowerCase().indexOf(q)>=0)
        r.push({type:"goal",text:t.text||"",sub:(g.name||"")+(t.notes&&t.notes.toLowerCase().indexOf(q)>=0?" · in notes":""),goalColor:g.color});});
      (ws.groups||[]).forEach(function(grp){if(!grp||!grp.tasks)return;
        grp.tasks.forEach(function(t){if(!t)return;
          if((t.text||"").toLowerCase().indexOf(q)>=0||(t.notes||"").toLowerCase().indexOf(q)>=0)
          r.push({type:"goal",text:t.text||"",sub:(g.name||"")+" → "+(grp.name||"")+(t.notes&&t.notes.toLowerCase().indexOf(q)>=0?" · in notes":""),goalColor:g.color});});});
      if(ws.notes&&Array.isArray(ws.notes)){ws.notes.forEach(function(b){if(!b)return;
        if(b.content&&b.content.toLowerCase().indexOf(q)>=0)r.push({type:"note",text:b.content.slice(0,80),sub:(g.name||"")+" · notes",goalColor:g.color});});}});
    // Gratitude
    Object.keys(gratEntries||{}).forEach(function(dk){var e=gratEntries[dk];if(!e)return;
      var txt=typeof e==="string"?e:(e.response||e.text||"");
      if(txt&&txt.toLowerCase().indexOf(q)>=0)
      r.push({type:"gratitude",text:txt.slice(0,80),sub:dk+" · gratitude",dk:dk});});
    // Daily log
    Object.keys(logEntries||{}).forEach(function(dk){var e=logEntries[dk];if(!e)return;
      var txt=typeof e==="string"?e:(e.text||e.response||"");
      if(txt&&txt.toLowerCase().indexOf(q)>=0)
      r.push({type:"log",text:txt.slice(0,80),sub:dk+" · daily log",dk:dk});});
    // Refocus
    Object.keys(refocusEntries||{}).forEach(function(dk){var e=refocusEntries[dk];if(!e||typeof e!=="object")return;
      if(((e.focus||"").toLowerCase().indexOf(q)>=0||(e.meaning||"").toLowerCase().indexOf(q)>=0||(e.action||"").toLowerCase().indexOf(q)>=0))
      r.push({type:"refocus",text:e.focus||"",sub:dk+" · refocus",dk:dk});});
    // Milestones
    (milestones||[]).forEach(function(ms){if(!ms||!ms.text)return;
      if(ms.text.toLowerCase().indexOf(q)>=0)
      r.push({type:"milestone",text:ms.text,sub:(ms.dk||"")+" · milestone",dk:ms.dk,goalColor:ms.color});});
    }catch(ex){console.error("Search error:",ex);}
    return r.slice(0,30);},[query,tasks,inbox,goals,goalWorkspaces,gratEntries,logEntries,refocusEntries,milestones]);
  var typeIcons={task:"◻",inbox:"↓",goal:"◎",note:"✎",gratitude:"♡",log:"◆",refocus:"◉",milestone:"⚑"};
  var typeColors={task:P.ac,inbox:P.ac,goal:"",note:P.tm,gratitude:"#d4a574",log:"#60a5fa",refocus:"#849BE8",milestone:""};
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:P.overlay,zIndex:250,display:"flex",justifyContent:"center",paddingTop:80}}
      onClick={onClose}>
      <div style={{width:"100%",maxWidth:520,maxHeight:"70vh",background:P.panel,border:"1px solid "+P.panelBd,borderRadius:14,
        boxShadow:"0 20px 60px "+P.shadow,display:"flex",flexDirection:"column",overflow:"hidden"}}
        onClick={function(e){e.stopPropagation();}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid "+P.bd+"66",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16,color:P.td}}>⌕</span>
          <input ref={inputRef} value={query} onChange={function(e){setQuery(e.target.value);}}
            placeholder="Search tasks, notes, entries..."
            style={{flex:1,fontSize:15,color:P.tx,background:"transparent",border:"none",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
          {query&&<span onClick={function(){setQuery("");}} style={{fontSize:14,color:P.td,cursor:"pointer",padding:"2px 6px"}}>×</span>}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
          {query.length>=2&&results.length===0&&<div style={{padding:"20px 16px",textAlign:"center",color:P.td,fontSize:13}}>No results found</div>}
          {results.map(function(r,ri){var ic=typeIcons[r.type]||"·";var col=r.goalColor||typeColors[r.type]||P.td;
            return(<div key={ri} onClick={function(){if(r.dk&&onNavigate)onNavigate(r.dk);onClose();}}
              style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 16px",cursor:r.dk?"pointer":"default",transition:"background 0.1s"}}
              onMouseEnter={function(e){e.currentTarget.style.background=P.sfh;}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
              <span style={{fontSize:13,color:col,flexShrink:0,marginTop:2}}>{ic}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,color:P.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.text}</div>
                <div style={{fontSize:11,color:P.td,fontFamily:"'DM Mono',monospace",marginTop:1}}>{r.sub}</div></div>
            </div>);})}</div>
        <div style={{padding:"8px 16px",borderTop:"1px solid "+P.bd+"33",fontSize:10,color:P.td,fontFamily:"'DM Mono',monospace",
          display:"flex",justifyContent:"space-between"}}>
          <span>{results.length>0?results.length+" result"+(results.length>1?"s":""):""}</span>
          <span>Esc to close</span></div>
      </div></div>);}

/* ═══ ITEM DETAIL (for Inbox & Goal tasks) ═══ */

/* ═══ MORNING RITUAL ═══ */
var RITUAL_SH=5;var RITUAL_EH=13;var RITUAL_HPX=100;
function MorningRitual({routine,template,onUpdateRoutine,onSaveTemplate,onClose,P}){

    return function(){clearInterval(iv);};},[timerOn]);

  var y2min=function(y){return Math.round((y/RITUAL_HPX)*60)+RITUAL_SH*60;};
  var snap=function(m){return Math.round(m/5)*5;};
  var fmt=function(m){var h=Math.floor(m/60);var mm=m%60;return(h>12?h-12:h===0?12:h)+":"+(mm<10?"0":"")+mm+(h<12?" am":" pm");};
  var fmtT=function(t){if(!t)return"";var p=t.split(":");var h=parseInt(p[0]);var m=parseInt(p[1]);return(h>12?h-12:h===0?12:h)+":"+(m<10?"0":"")+m+(h<12?" am":" pm");};
  var t2m=function(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);};

  var total=items.length;var done=items.filter(function(x){return x.done;}).length;var pct=total>0?Math.round((done/total)*100):0;

  var completeItem=function(idx){setTimerOn(false);setItems(function(p){return p.map(function(it,i){return i===idx?Object.assign({},it,{done:true}):it;});});

    e.preventDefault();e.currentTarget.style.background="transparent";

              return(
                <div key={s.task.id} style={{flex:1,display:"flex",alignItems:"center",gap:4}}>

                  height:span>1?ROW*span-4:ROW-4,display:"flex",alignItems:"center"}}
                  onDoubleClick={function(){setEditId(s.task.id);setEditText(s.task.text);}}>
                  {editId===s.task.id?(<input value={editText} onChange={function(e){setEditText(e.target.value);}}
                    onKeyDown={function(e){if(e.key==="Enter"){if(editText.trim()&&onEditTask)onEditTask(s.task.id,editText.trim());setEditId(null);}if(e.key==="Escape")setEditId(null);}}

                    ref={function(el){if(el){el.focus();}}} onClick={function(e){e.stopPropagation();}}
